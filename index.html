<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Atica Paris — Ad Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f2;--white:#fff;--border:#ddddd8;--borderl:#e9e9e5;
  --text:#111;--t2:#464642;--t3:#8a8a84;
  --green:#166f40;--gbg:#eaf5f0;--red:#b02e24;--rbg:#fdf0ef;
  --amber:#8a5c00;--abg:#fef8e7;--blue:#1557a0;--bbg:#e8f4ff;
  --sw:214px;--hh:58px;--r:8px;
}
html,body{height:100%;font-family:'Calibri',Calibri,Candara,Geneva,Tahoma,sans-serif;font-size:13.5px;color:var(--text);background:var(--bg);}
.app{display:flex;height:100vh;overflow:hidden;}
/* Sidebar */
.sb{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo .n{font-size:14px;font-weight:700;letter-spacing:.3px;}
.sb-logo .s{font-size:9px;color:var(--t3);margin-top:3px;letter-spacing:.7px;text-transform:uppercase;}
.sb-sec{padding:14px 16px 5px;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);}
.sb-it{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--t2);border-left:2.5px solid transparent;transition:all .12s;user-select:none;}
.sb-it:hover{background:#f6f6f4;color:var(--text);}
.sb-it.on{color:var(--text);font-weight:600;border-left-color:var(--text);background:#efeeeb;}
.sb-it .sub{display:block;font-size:9.5px;color:var(--t3);margin-top:1px;}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:1px;}
.sb-foot{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);font-size:9.5px;color:var(--t3);line-height:1.8;}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:var(--hh);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0;position:relative;z-index:200;}
.tb-ttl{font-size:14.5px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Calendar */
.cal-wrap{position:relative;flex-shrink:0;}
.cal-btn{display:flex;align-items:center;gap:8px;padding:6px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;font-size:12.5px;color:var(--text);user-select:none;white-space:nowrap;min-width:200px;transition:border-color .12s;}
.cal-btn:hover{border-color:#999;}
.cal-btn .ci{font-size:13px;}
.cal-btn .cl{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;}
.cal-btn .ca{font-size:8px;color:var(--t3);transition:transform .15s;}
.cal-btn .ca.up{transform:rotate(180deg);}
.cal-dd{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:0 10px 36px rgba(0,0,0,.13);z-index:400;width:300px;max-height:72vh;overflow:hidden;flex-direction:column;}
.cal-dd.open{display:flex;}
.cal-scroll{overflow-y:auto;flex:1;}
.cal-col{padding:14px 16px 10px;}
.cal-mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--borderl);}
.cal-mname{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text);}
.cal-wbtn{display:block;width:100%;text-align:left;padding:7px 9px;border-radius:5px;border:1px solid transparent;background:transparent;font-family:inherit;font-size:11.5px;color:var(--t2);cursor:pointer;transition:all .12s;margin-bottom:3px;}
.cal-wbtn:hover:not(:disabled){background:var(--bg);border-color:var(--border);}
.cal-wbtn.wsel{background:var(--text);color:#fff;}
.cal-wbtn:disabled{opacity:.32;cursor:default;}
.cal-bar{border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;background:#fafaf8;flex-shrink:0;}
.cal-sum{font-size:11.5px;color:var(--t2);font-weight:500;}
/* Tabs */
.tabs{display:flex;gap:1px;background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:2px;flex-shrink:0;}
.tab{padding:5px 13px;border-radius:4px;font-size:11.5px;cursor:pointer;color:var(--t2);white-space:nowrap;transition:all .12s;}
.tab.on{background:var(--white);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.content{flex:1;overflow-y:auto;padding:22px 26px;}
/* KPIs */
.kg{display:grid;gap:13px;margin-bottom:18px;}
.kc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.kl{font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.kv{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.6px;}
.kv.na{color:var(--t3);font-size:20px;}
.ks{font-size:11px;color:var(--t3);margin-top:5px;}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:7px;}
.chip.up{background:var(--gbg);color:var(--green);}
.chip.dn{background:var(--rbg);color:var(--red);}
.chip.neu{background:#f0f0ec;color:var(--t3);}
/* Layout */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.sec{display:flex;align-items:center;justify-content:space-between;margin:22px 0 11px;}
.sec h2{font-size:9px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--t3);}
.secn{font-size:11px;color:var(--t3);}
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
.pttl{font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:14px;}
/* Bars */
.bars{display:flex;flex-direction:column;gap:9px;}
.brow{display:flex;align-items:center;gap:10px;}
.blbl{width:118px;font-size:12px;color:var(--t2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.btrack{flex:1;height:18px;background:var(--bg);border-radius:3px;overflow:hidden;}
.bfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.bnum{width:76px;font-size:12px;font-weight:600;text-align:right;flex-shrink:0;white-space:nowrap;}
/* Tables */
.dt{width:100%;border-collapse:collapse;font-size:13px;}
.dt thead th{font-size:8.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--t3);padding:9px 11px;border-bottom:1.5px solid var(--border);text-align:right;white-space:nowrap;}
.dt thead th:first-child{text-align:left;}
.dt thead th.tha{width:160px;padding:9px 8px;text-align:left;}
.dt tbody td{padding:9px 11px;border-bottom:1px solid var(--borderl);text-align:right;white-space:nowrap;}
.dt tbody td:first-child{text-align:left;}
.dt tbody tr:last-child td{border-bottom:none;}
.dt tbody tr:hover td{background:#f8f8f6;}
.dt tfoot td{padding:10px 11px;border-top:2px solid var(--border);font-weight:700;text-align:right;background:#f6f6f4;white-space:nowrap;}
.dt tfoot td:first-child{text-align:left;}
.dt .grouphd td{background:#fafaf8;font-weight:700;font-size:11.5px;color:var(--t2);padding-top:13px;border-bottom:1px solid var(--border);}
.vc{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.vdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tup{color:var(--green);font-weight:600;}
.tdn{color:var(--red);font-weight:600;}
.tna{color:var(--t3);}
.indtag{font-size:9.5px;color:var(--t3);}
/* Ad-set indented rows */
.ads-row td:first-child{padding-left:28px !important;}
.ads-row td:first-child::before{content:"↳ ";color:var(--t3);}
/* Analysis tags */
.atag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap;margin-bottom:3px;}
.atag-keep{background:var(--gbg);color:var(--green);border:1px solid #b8e4cc;}
.atag-scale{background:var(--bbg);color:var(--blue);border:1px solid #b8d4f0;}
.atag-watch{background:var(--abg);color:var(--amber);border:1px solid #f0d9a0;}
.atag-pause{background:var(--rbg);color:var(--red);border:1px solid #f0c4c0;}
.anote{font-size:11px;color:var(--t3);line-height:1.45;margin-top:2px;}
/* Funnel */
.funnel{display:flex;flex-direction:column;gap:7px;}
.fnrow{display:flex;align-items:center;gap:10px;}
.fnlbl{width:96px;font-size:12px;color:var(--t2);text-align:right;flex-shrink:0;}
.fnbar{border-radius:4px;height:30px;display:flex;align-items:center;padding:0 13px;font-size:12.5px;font-weight:600;color:white;min-width:56px;}
.fnval{width:66px;font-size:12.5px;font-weight:600;text-align:right;flex-shrink:0;}
/* Branch header */
.bhd{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.bicon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;flex-shrink:0;}
.bname{font-size:22px;font-weight:700;}
.bsub{font-size:12px;color:var(--t3);width:100%;margin-top:-8px;}
.bpill{font-size:11px;color:var(--t2);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:10px;}
.stpill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.stpill.done{background:#f0f0ec;color:var(--t3);border:1px solid var(--border);}
.stpill.live{background:var(--rbg);color:var(--red);border:1px solid #f0c4c0;}
.stpill.up{background:var(--bbg);color:var(--blue);border:1px solid #b8d4f0;}
/* Misc */
.infobox{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:13px 17px;margin-bottom:14px;font-size:12.5px;color:var(--t2);line-height:1.7;}
.footer{font-size:10px;color:var(--t3);margin-top:24px;padding-top:14px;border-top:1px solid var(--borderl);display:flex;gap:20px;flex-wrap:wrap;}
.kwlbl{font-size:9px;color:var(--t3);font-weight:600;}
</style>
</head>
<body>
<div class="app">
<aside class="sb">
  <div class="sb-logo"><div class="n">ATICA PARIS</div><div class="s">Ad Performance Report</div></div>
  <div class="sb-sec">Overview</div>
  <div class="sb-it on" onclick="nav('all',this)"><span class="sb-dot" style="background:#111;"></span>Account Overview</div>
  <div class="sb-sec">Channels</div>
  <div class="sb-it" onclick="nav('meta',this)"><span class="sb-dot" style="background:#1877F2;"></span><span><span>Meta Ads</span><span class="sub">Reservations + Traffic · Jun 2026</span></span></div>
  <div class="sb-it" onclick="nav('tiktok',this)"><span class="sb-dot" style="background:#FE2C55;"></span><span><span>TikTok Ads</span><span class="sub">Search · Jun 2026</span></span></div>
  <div class="sb-foot">Atica Paris · Meta + TikTok Ads<br/>Updated: 30 Jun 2026</div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-ttl" id="tbt">Account Overview</div>
    <div class="cal-wrap" id="cW">
      <div class="cal-btn" onclick="calToggle()"><span class="ci">📅</span><span class="cl" id="cL">June 2026</span><span class="ca" id="cA">▼</span></div>
      <div class="cal-dd" id="cD">
        <div class="cal-scroll">
          <div class="cal-col">
            <div class="cal-mhd"><span class="cal-mname">2026</span></div>
            <button class="cal-wbtn wsel" onclick="selectMonth('June 2026',this)">June 2026 — Full month (active)</button>
            <button class="cal-wbtn" disabled>July 2026 — No data yet</button>
            <button class="cal-wbtn" disabled>August 2026 — No data yet</button>
            <button class="cal-wbtn" disabled>September 2026 — No data yet</button>
            <button class="cal-wbtn" disabled>October 2026 — No data yet</button>
            <button class="cal-wbtn" disabled>November 2026 — No data yet</button>
            <button class="cal-wbtn" disabled>December 2026 — No data yet</button>
          </div>
        </div>
        <div class="cal-bar"><span class="cal-sum">Reporting captured for June 2026</span></div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab on" onclick="setTab('perf',this)">Performance</div>
      <div class="tab" onclick="setTab('breakdown',this)">Channel Breakdown</div>
      <div class="tab" onclick="setTab('eff',this)">Efficiency</div>
    </div>
  </div>
  <div class="content" id="cnt"></div>
</div>
</div>
<script>
// ── DATA ── Atica Paris Ad Account · June 2026 (full month) ──
const C=[
  {id:'meta',  name:'Meta Ads',  sub:'Reservations + Traffic · Jun 2026', c:'#1877F2', icon:'M'},
  {id:'tiktok',name:'TikTok Ads',sub:'Search · Jun 2026',                 c:'#FE2C55', icon:'T'},
];

const D={
  meta:{rt:'Mixed (Conversions / Landing Page Views)',ads:[
    {n:'CK - Atica Paris - Zen Chef Bookings (750€)',re:40427,im:92620,cl:845,sp:749.92,res:5,ind:'Reservations (Pixel)',tag:'watch',note:'Highest-intent objective in the account, optimizing for on-site reservations via the Meta Pixel. Cost per reservation (€149.98) is steep on a small 5-conversion sample this month — worth double-checking pixel/event setup and testing a dedicated lower-funnel audience before scaling spend.'},
    {n:'CK - Atica Paris - Traffic (200€)',re:49209,im:91064,cl:1206,sp:199.72,res:997,ind:'Landing Page Views',tag:'keep',note:'Efficient top-of-funnel driver at €0.20 per landing page view and a healthy 1.32% CTR. Good complement to the Bookings campaign — feeds awareness cheaply while Bookings handles direct-response.'},
  ]},
  tiktok:{rt:'Search Ads (Clicks)',ads:[
    {n:'Atica Search - June 2026',re:53801,im:99739,cl:4681,sp:580.00,res:2403,ind:'Results (TikTok)',tag:'scale',note:'Search-intent traffic converting at a strong 4.69% CTR — well above both Meta campaigns — at an efficient €0.12 CPC. The best-performing channel in the account this month; clear candidate to scale budget.'},
  ],
  keywords:{
    manual:[
      {kw:'paris date idea',mt:'Broad match',cost:194.16,im:19222,cpm:10.10,cl:909,cpc:0.21,ctr:4.73},
      {kw:'aesthetic dinner paris',mt:'Broad match',cost:48.75,im:5204,cpm:9.37,cl:216,cpc:0.23,ctr:4.15},
      {kw:'instagrammable paris',mt:'Broad match',cost:43.35,im:4599,cpm:9.43,cl:207,cpc:0.21,ctr:4.50},
      {kw:'sensory dining experience',mt:'Broad match',cost:6.09,im:886,cpm:6.87,cl:24,cpc:0.25,ctr:2.71},
      {kw:'best dinner show paris',mt:'Broad match',cost:3.46,im:341,cpm:10.15,cl:15,cpc:0.23,ctr:4.40},
      {kw:'tahiti immersive paris',mt:'Broad match',cost:2.39,im:553,cpm:4.32,cl:11,cpc:0.22,ctr:1.99},
      {kw:'french polunesia dining',mt:'Broad match',cost:1.29,im:269,cpm:4.80,cl:5,cpc:0.26,ctr:1.86},
      {kw:'birthday dinner',mt:'Phrase match',cost:0.85,im:25,cpm:34.00,cl:3,cpc:0.28,ctr:12.00},
      {kw:'event venue paris',mt:'Phrase match',cost:0.40,im:109,cpm:3.67,cl:3,cpc:0.13,ctr:2.75},
    ],
    other:'atica experience paris, fashion week events, private dining paris, reva atica — each under 5 impressions this month',
    automated:{
      agg:{cost:279.26,im:68507,cpm:4.08,cl:1010,cpc:0.28,ctr:1.47},
      terms:[
        {kw:'resto paris',cost:6.62,im:738,cpm:8.97,cl:30,cpc:0.22,ctr:4.07},
        {kw:'paris (Arabic script)',cost:5.03,im:329,cpm:15.29,cl:19,cpc:0.26,ctr:5.78},
        {kw:'cafe paris',cost:4.87,im:631,cpm:7.72,cl:22,cpc:0.22,ctr:3.49},
        {kw:'paris',cost:4.48,im:252,cpm:17.78,cl:20,cpc:0.22,ctr:7.94},
        {kw:'paris must go places',cost:4.19,im:217,cpm:19.31,cl:16,cpc:0.26,ctr:7.37},
        {kw:'shopping paris',cost:3.84,im:216,cpm:17.78,cl:16,cpc:0.24,ctr:7.41},
        {kw:'paris paris paris',cost:2.59,im:154,cpm:16.82,cl:12,cpc:0.22,ctr:7.79},
        {kw:'darling brunch paris',cost:2.41,im:247,cpm:9.76,cl:12,cpc:0.20,ctr:4.86},
        {kw:'paris now',cost:1.90,im:467,cpm:4.07,cl:7,cpc:0.27,ctr:1.50},
        {kw:'bar paris',cost:1.69,im:237,cpm:7.13,cl:7,cpc:0.24,ctr:2.95},
      ],
      allOther:{cost:241.64,im:65019,cpm:3.72,cl:849,cpc:0.28,ctr:1.31},
    }
  }},
};

const PERIOD='June 2026';
let VIEW='all',TAB='perf';

function e$(v,d=2){return'€'+v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fN(v){return Math.round(v).toLocaleString();}
function fK(v){v=Math.round(v);return v>=1000?(v/1000).toFixed(v>=10000?0:1)+'K':v.toLocaleString();}
function pct(a,b){return b?(a/b*100):0;}

function agg(ads){return ads.reduce((a,x)=>({re:a.re+x.re,im:a.im+x.im,cl:a.cl+x.cl,sp:a.sp+x.sp}),{re:0,im:0,cl:0,sp:0});}
function allAds(){return C.flatMap(c=>D[c.id].ads.map(a=>({...a,camp:c})));}

function atag(t){const m={keep:['KEEP','✓'],scale:['SCALE','▲'],watch:['WATCH','⚠'],pause:['PAUSE','■']};const[l,i]=m[t]||m.keep;return`<span class="atag atag-${t}">${i} ${l}</span>`;}

function calToggle(){document.getElementById('cD').classList.toggle('open');document.getElementById('cA').classList.toggle('up');}
function selectMonth(label,el){document.querySelectorAll('.cal-wbtn').forEach(b=>b.classList.remove('wsel'));el.classList.add('wsel');document.getElementById('cL').textContent=label;calToggle();}
document.addEventListener('click',e=>{const w=document.getElementById('cW');if(w&&!w.contains(e.target)){document.getElementById('cD').classList.remove('open');document.getElementById('cA').classList.remove('up');}});

function nav(id,el){VIEW=id;document.querySelectorAll('.sb-it').forEach(x=>x.classList.remove('on'));el.classList.add('on');
  const tabsEl=document.querySelector('.tabs');
  if(id==='all'){tabsEl.style.display='flex';document.getElementById('tbt').textContent='Account Overview';TAB='perf';
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
  }else{tabsEl.style.display='none';document.getElementById('tbt').textContent=C.find(c=>c.id===id).name;}
  render();
}
function setTab(t,el){TAB=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}

// ── OVERVIEW: PERFORMANCE ──
function renderPerf(){
  const tot=agg(allAds());
  const spByC=C.map(c=>({c,sp:agg(D[c.id].ads).sp})).sort((a,b)=>b.sp-a.sp);
  const maxSp=Math.max(...spByC.map(x=>x.sp));
  const bars=spByC.map(({c,sp})=>`<div class="brow"><div class="blbl">${c.name}</div><div class="btrack"><div class="bfill" style="width:${(sp/maxSp*100).toFixed(0)}%;background:${c.c};"></div></div><div class="bnum">${e$(sp)}</div></div>`).join('');
  const fd=[{n:'Reach',val:tot.re,a:''},{n:'Impressions',val:tot.im,a:'cc'},{n:'Link Clicks',val:tot.cl,a:'88'}];
  const fmax=Math.max(...fd.map(f=>f.val));
  const funnel=fd.map(f=>`<div class="fnrow"><div class="fnlbl">${f.n}</div><div class="fnbar" style="width:${Math.max(f.val/fmax*100,6).toFixed(0)}%;background:#111${f.a};"></div><div class="fnval">${fK(f.val)}</div></div>`).join('');
  return`<div>
    <div class="infobox"><strong>Atica Paris — Meta + TikTok Ad Accounts.</strong> Reporting period: June 2026 (full month) across 1 Meta account (2 campaigns) and 1 TikTok account (1 Search ad group, plus keyword-level results). Reach is summed across campaigns/channels and is not deduplicated for cross-channel overlap. Use the sidebar to drill into either channel.</div>
    <div class="kg" style="grid-template-columns:repeat(5,1fr);">
      <div class="kc"><div class="kl">Amount Spent</div><div class="kv">${e$(tot.sp)}</div><div class="ks">June 2026</div></div>
      <div class="kc"><div class="kl">Reach</div><div class="kv">${fK(tot.re)}</div><div class="ks">Summed across channels</div></div>
      <div class="kc"><div class="kl">Impressions</div><div class="kv">${fN(tot.im)}</div><div class="ks">Total ad views</div></div>
      <div class="kc"><div class="kl">Link Clicks</div><div class="kv">${fN(tot.cl)}</div><div class="ks">${pct(tot.cl,tot.im).toFixed(2)}% overall CTR</div></div>
      <div class="kc"><div class="kl">Avg. CPC</div><div class="kv">${e$(tot.sp/tot.cl)}</div><div class="ks">Account-wide blended</div></div>
    </div>
    <div class="g2">
      <div class="panel"><div class="pttl">Spend by Channel</div><div class="bars">${bars}</div></div>
      <div class="panel"><div class="pttl">Audience Funnel — All Channels</div><div class="funnel">${funnel}</div></div>
    </div>
    <div class="sec"><h2>Channel Summary</h2><span class="secn">${PERIOD}</span></div>
    <div class="panel" style="padding:0;overflow:hidden;margin-bottom:18px;">
      <table class="dt"><thead><tr><th style="text-align:left;">Channel</th><th>Spent</th><th>Reach</th><th>Impressions</th><th>Link Clicks</th><th>CTR</th><th>CPC</th></tr></thead>
      <tbody>${C.map(c=>{const a=agg(D[c.id].ads);return`<tr><td><span class="vc"><span class="vdot" style="background:${c.c};"></span>${c.name}</span></td><td>${e$(a.sp)}</td><td>${fK(a.re)}</td><td>${fN(a.im)}</td><td>${fN(a.cl)}</td><td>${pct(a.cl,a.im).toFixed(2)}%</td><td>${a.cl?e$(a.sp/a.cl):'—'}</td></tr>`;}).join('')}</tbody>
      <tfoot><tr><td>TOTAL</td><td>${e$(tot.sp)}</td><td>${fK(tot.re)}</td><td>${fN(tot.im)}</td><td>${fN(tot.cl)}</td><td>${pct(tot.cl,tot.im).toFixed(2)}%</td><td>${e$(tot.sp/tot.cl)}</td></tr></tfoot></table>
    </div>
    <div class="footer"><span>Period: ${PERIOD}</span><span>⚡ Atica Paris — Account Overview</span></div>
  </div>`;
}

// ── OVERVIEW: CHANNEL BREAKDOWN ──
function renderBreakdown(){
  const tot=agg(allAds());
  const groups=C.map(c=>{
    const a=agg(D[c.id].ads);
    const rows=D[c.id].ads.map(x=>`<tr class="ads-row"><td>${x.n}</td><td>${e$(x.sp)}</td><td>${fK(x.re)}</td><td>${fN(x.im)}</td><td>${fN(x.cl)}</td><td><span class="indtag">${x.ind}</span><br>${fN(x.res)}</td><td style="text-align:left;white-space:normal;padding:8px 10px;"><div>${atag(x.tag)}<div class="anote">${x.note}</div></div></td></tr>`).join('');
    return`<tr class="grouphd"><td><span class="vc"><span class="vdot" style="background:${c.c};"></span>${c.name}</span></td><td>${e$(a.sp)}</td><td>${fK(a.re)}</td><td>${fN(a.im)}</td><td>${fN(a.cl)}</td><td colspan="2"></td></tr>${rows}`;
  }).join('');
  return`<div>
    <div class="infobox"><strong>Channel Breakdown.</strong> Both campaigns/ad groups across the 2 active channels for June. "Results" reflects each line's own optimization goal — reservations, landing page views, or TikTok's own results metric — so totals are not directly comparable across rows with different goals.</div>
    <div class="sec"><h2>Campaigns / Ad Groups by Channel</h2><span class="secn">${PERIOD}</span></div>
    <div class="panel" style="padding:0;overflow:hidden;margin-bottom:18px;">
      <table class="dt"><thead><tr><th style="text-align:left;">Channel / Campaign</th><th>Spent</th><th>Reach</th><th>Impressions</th><th>Link Clicks</th><th>Results</th><th class="tha">Analysis</th></tr></thead>
      <tbody>${groups}</tbody>
      <tfoot><tr><td>ACCOUNT TOTAL</td><td>${e$(tot.sp)}</td><td>${fK(tot.re)}</td><td>${fN(tot.im)}</td><td>${fN(tot.cl)}</td><td></td><td></td></tr></tfoot></table>
    </div>
    <div class="footer"><span>Period: ${PERIOD}</span><span>⚡ Atica Paris — Channel Breakdown</span></div>
  </div>`;
}

// ── OVERVIEW: EFFICIENCY ──
function renderEff(){
  const ads=allAds().sort((a,b)=>pct(b.cl,b.im)-pct(a.cl,a.im));
  const rows=ads.map(a=>{const ctr=pct(a.cl,a.im),cpc=a.cl?a.sp/a.cl:0,cpm=a.im?a.sp/a.im*1000:0;
    return`<tr><td><span class="vc"><span class="vdot" style="background:${a.camp.c};"></span>${a.n}</span></td><td>${ctr.toFixed(2)}%</td><td>${a.cl?e$(cpc):'—'}</td><td>${e$(cpm)}</td></tr>`;
  }).join('');
  return`<div>
    <div class="infobox"><strong>Efficiency Ranking.</strong> All 3 campaigns/ad groups ranked by click-through rate (CTR), with cost-per-click (CPC) and cost-per-1,000-impressions (CPM) for context.</div>
    <div class="panel" style="padding:0;overflow:hidden;margin-bottom:18px;">
      <table class="dt"><thead><tr><th style="text-align:left;">Campaign / Ad Group</th><th>CTR</th><th>CPC</th><th>CPM</th></tr></thead><tbody>${rows}</tbody></table>
    </div>
    <div class="footer"><span>Period: ${PERIOD}</span><span>⚡ Atica Paris — Efficiency</span></div>
  </div>`;
}

// ── KEYWORD TABLE (TikTok only) ──
function kwRow(k){return`<tr><td>${k.kw}</td><td>${e$(k.cost)}</td><td>${fN(k.im)}</td><td>${e$(k.cpm)}</td><td>${fN(k.cl)}</td><td>${e$(k.cpc)}</td><td>${k.ctr.toFixed(2)}%</td></tr>`;}
function renderKeywords(){
  const kw=D.tiktok.keywords;
  const manualRows=kw.manual.map(kwRow).join('');
  const manualTotalCost=kw.manual.reduce((s,k)=>s+k.cost,0);
  const manualTotalIm=kw.manual.reduce((s,k)=>s+k.im,0);
  const manualTotalCl=kw.manual.reduce((s,k)=>s+k.cl,0);
  const termRows=kw.automated.terms.map(kwRow).join('');
  const a=kw.automated.agg,o=kw.automated.allOther;
  return`
    <div class="sec"><h2>Search Keyword Results</h2><span class="secn">${PERIOD}</span></div>
    <div class="infobox"><strong>Manual Keywords.</strong> Terms explicitly targeted in the TikTok Search campaign, ranked by spend. Also tracked with negligible/no delivery this month: ${kw.other}.</div>
    <div class="panel" style="padding:0;overflow:hidden;margin-bottom:18px;">
      <table class="dt"><thead><tr><th style="text-align:left;">Keyword</th><th>Cost</th><th>Impressions</th><th>CPM</th><th>Clicks</th><th>CPC</th><th>CTR</th></tr></thead>
      <tbody>${manualRows}</tbody>
      <tfoot><tr><td>MANUAL KEYWORDS TOTAL</td><td>${e$(manualTotalCost)}</td><td>${fN(manualTotalIm)}</td><td></td><td>${fN(manualTotalCl)}</td><td></td><td>${pct(manualTotalCl,manualTotalIm).toFixed(2)}%</td></tr></tfoot></table>
    </div>
    <div class="infobox"><strong>Automated Keywords.</strong> TikTok's auto-matching expanded delivery beyond the manual keyword list, adding <span class="kwlbl">${e$(a.cost)}</span> in spend at a ${a.ctr.toFixed(2)}% CTR. Top 10 auto-matched terms by spend shown below, plus the aggregate for all remaining automated terms.</div>
    <div class="panel" style="padding:0;overflow:hidden;margin-bottom:18px;">
      <table class="dt"><thead><tr><th style="text-align:left;">Auto-Matched Term</th><th>Cost</th><th>Impressions</th><th>CPM</th><th>Clicks</th><th>CPC</th><th>CTR</th></tr></thead>
      <tbody>${termRows}<tr><td><span class="indtag">All other automated terms</span></td><td>${e$(o.cost)}</td><td>${fN(o.im)}</td><td>${e$(o.cpm)}</td><td>${fN(o.cl)}</td><td>${e$(o.cpc)}</td><td>${o.ctr.toFixed(2)}%</td></tr></tbody>
      <tfoot><tr><td>AUTOMATED KEYWORDS TOTAL</td><td>${e$(a.cost)}</td><td>${fN(a.im)}</td><td>${e$(a.cpm)}</td><td>${fN(a.cl)}</td><td>${e$(a.cpc)}</td><td>${a.ctr.toFixed(2)}%</td></tr></tfoot></table>
    </div>
    <div class="infobox" style="font-size:11.5px;">Manual (${e$(manualTotalCost)}) + Automated (${e$(a.cost)}) keyword spend = <strong>${e$(manualTotalCost+a.cost)}</strong>, reconciling to the full TikTok Search ad group spend for June.</div>
  `;
}

// ── SINGLE CHANNEL ──
function renderChannel(id){
  const c=C.find(x=>x.id===id),vd=D[id];
  const a=agg(vd.ads);
  const fd=[{n:'Reach',val:a.re},{n:'Impressions',val:a.im},{n:'Link Clicks',val:a.cl}];
  const fmax=Math.max(...fd.map(f=>f.val));
  const funnel=fd.map(f=>`<div class="fnrow"><div class="fnlbl">${f.n}</div><div class="fnbar" style="width:${Math.max(f.val/fmax*100,6).toFixed(0)}%;background:${c.c};"></div><div class="fnval">${fK(f.val)}</div></div>`).join('');
  const adRows=vd.ads.map(x=>`<tr><td>${x.n}</td><td>${e$(x.sp)}</td><td>${fK(x.re)}</td><td>${fN(x.im)}</td><td>${fN(x.cl)}</td><td><span class="indtag">${x.ind}</span><br>${fN(x.res)}</td><td style="text-align:left;white-space:normal;padding:8px 10px;"><div>${atag(x.tag)}<div class="anote">${x.note}</div></div></td></tr>`).join('');
  const spendBars=vd.ads.map(x=>`<div class="brow"><div class="blbl">${x.n.length>26?x.n.slice(0,24)+'…':x.n}</div><div class="btrack"><div class="bfill" style="width:${(x.sp/Math.max(...vd.ads.map(y=>y.sp))*100).toFixed(0)}%;background:${c.c};"></div></div><div class="bnum">${e$(x.sp)}</div></div>`).join('');
  return`<div>
    <div class="bhd"><div class="bicon" style="background:${c.c};">${c.icon}</div><div class="bname">${c.name}</div><span class="bpill">📅 ${PERIOD}</span><span class="stpill done">Completed · Full Month</span><span class="bsub">${c.sub}</span></div>
    <div class="kg" style="grid-template-columns:repeat(5,1fr);">
      <div class="kc"><div class="kl">Amount Spent</div><div class="kv">${e$(a.sp)}</div><div class="ks">Period total</div></div>
      <div class="kc"><div class="kl">Reach</div><div class="kv">${fK(a.re)}</div><div class="ks">Summed across campaigns</div></div>
      <div class="kc"><div class="kl">Impressions</div><div class="kv">${fN(a.im)}</div><div class="ks">Total ad views</div></div>
      <div class="kc"><div class="kl">Link Clicks</div><div class="kv">${fN(a.cl)}</div><div class="ks">${pct(a.cl,a.im).toFixed(2)}% CTR</div></div>
      <div class="kc"><div class="kl">Avg. CPC</div><div class="kv">${a.cl?e$(a.sp/a.cl):'—'}</div><div class="ks">${vd.rt}</div></div>
    </div>
    <div class="g2"><div class="panel"><div class="pttl">Audience Funnel</div><div class="funnel">${funnel}</div></div>
      <div class="panel"><div class="pttl">Spend Split</div><div class="bars">${spendBars}</div></div>
    </div>
    <div class="sec"><h2>Campaign Breakdown &amp; Analysis</h2><span class="secn">${PERIOD}</span></div>
    <div class="panel" style="padding:0;overflow:hidden;margin-bottom:18px;">
      <table class="dt"><thead><tr><th style="text-align:left;">Campaign / Ad Group</th><th>Spent</th><th>Reach</th><th>Impressions</th><th>Link Clicks</th><th>Results</th><th class="tha">Analysis</th></tr></thead>
      <tbody>${adRows}</tbody>
      <tfoot><tr><td>TOTAL</td><td>${e$(a.sp)}</td><td>${fK(a.re)}</td><td>${fN(a.im)}</td><td>${fN(a.cl)}</td><td></td><td></td></tr></tfoot></table>
    </div>
    ${id==='tiktok'?renderKeywords():''}
    <div class="footer"><span>Period: ${PERIOD}</span><span>⚡ Atica Paris · ${c.name}</span></div>
  </div>`;
}

function render(){
  let h='';
  if(VIEW==='all'){if(TAB==='perf')h=renderPerf();else if(TAB==='breakdown')h=renderBreakdown();else h=renderEff();}
  else h=renderChannel(VIEW);
  document.getElementById('cnt').innerHTML=h;
}
render();
</script>
</body>
</html>
